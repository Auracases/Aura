<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ready-made Cases — Aura Cases</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<script src="analytics.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FBF5EA;--ink:#211C15;--ink-soft:#6E6557;--card:#FFFFFF;--accent:#FF4B1F;--accent-dark:#D63A12;
    --green:#0B8C5D;--green-bg:#E2F4EB;--line:#211C15;--radius:18px;--shadow:4px 4px 0 var(--ink);
    --font-display:"Bricolage Grotesque",sans-serif;--font-body:"Hanken Grotesk",sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:var(--font-body);background:var(--bg);background-image:radial-gradient(rgba(33,28,21,.07) 1px,transparent 1px);
    background-size:22px 22px;color:var(--ink);min-height:100vh;padding-bottom:80px;}
  .wrap{max-width:760px;margin:0 auto;padding:0 16px;}
  header{position:sticky;top:0;z-index:50;background:var(--bg);border-bottom:2px solid var(--ink);}
  .head-in{max-width:760px;margin:0 auto;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  .logo{font-family:var(--font-display);font-weight:800;font-size:1.4rem;letter-spacing:-.5px;line-height:1;}
  .logo span{color:var(--accent);} .logo small{display:block;font-family:var(--font-body);font-weight:500;font-size:.6rem;color:var(--ink-soft);margin-top:2px;}
  .nav{display:flex;align-items:center;gap:8px;}
  .nav a{text-decoration:none;color:var(--ink);font-weight:700;font-size:.8rem;border:2px solid var(--ink);border-radius:11px;padding:8px 11px;background:#fff;}
  .cart-btn{position:relative;background:var(--ink);color:#fff;border:2px solid var(--ink);border-radius:11px;padding:8px 12px;font-weight:700;font-size:.82rem;cursor:pointer;}
  .cart-count{background:var(--accent);color:#fff;border-radius:99px;padding:0 6px;margin-left:5px;font-size:.72rem;}
  .hero{padding:24px 0 6px;} .hero h1{font-family:var(--font-display);font-weight:800;font-size:clamp(1.6rem,7vw,2.2rem);line-height:1.08;letter-spacing:-1px;}
  .hero p{color:var(--ink-soft);margin-top:6px;font-size:.95rem;}
  .pills{display:flex;gap:9px;overflow-x:auto;padding:16px 0 6px;} .pill{flex-shrink:0;background:#fff;border:2px solid var(--ink);border-radius:999px;padding:8px 15px;font-weight:700;font-size:.85rem;cursor:pointer;}
  .pill.active{background:var(--ink);color:#fff;}
  .search{width:100%;padding:12px 14px;border:2px solid var(--ink);border-radius:13px;background:#FFFDF8;font:inherit;font-weight:600;margin:6px 0 4px;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:14px 0 50px;}
  @media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr);}}
  .p-card{border:2px solid var(--ink);border-radius:var(--radius);overflow:hidden;background:#fff;box-shadow:var(--shadow);cursor:pointer;display:flex;flex-direction:column;}
  .p-card .ph{aspect-ratio:1/1;background:#EFE9DC center/cover no-repeat;}
  .p-card .pb{padding:10px 11px;flex:1;display:flex;flex-direction:column;gap:3px;}
  .p-card .nm{font-weight:700;font-size:.9rem;line-height:1.2;}
  .p-card .fit{font-size:.72rem;color:var(--ink-soft);}
  .p-card .pr{font-weight:800;font-size:1rem;margin-top:auto;} .p-card .pr s{color:var(--ink-soft);font-weight:600;font-size:.82rem;margin-left:5px;}
  .disc{position:absolute;top:8px;left:8px;background:var(--accent);color:#fff;border-radius:8px;padding:2px 7px;font-size:.7rem;font-weight:800;}
  .p-card{position:relative;}
  .empty,.loading{text-align:center;color:var(--ink-soft);padding:40px 0;font-weight:600;grid-column:1/-1;}

  /* drawer/modal */
  .overlay{position:fixed;inset:0;background:rgba(20,16,30,.5);display:none;z-index:100;}
  .overlay.show{display:block;}
  .sheet{position:fixed;right:0;top:0;height:100%;width:min(440px,100%);background:var(--bg);border-left:2px solid var(--ink);
    z-index:101;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column;}
  .sheet.show{transform:translateX(0);}
  .sheet .sh-head{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:2px solid var(--ink);}
  .sheet .sh-body{flex:1;overflow-y:auto;padding:16px;}
  .sheet .sh-foot{border-top:2px solid var(--ink);padding:14px 16px;}
  .x{background:#f0ebe0;border:none;border-radius:9px;padding:6px 11px;font-weight:700;cursor:pointer;}
  .big-btn{width:100%;background:var(--accent);color:#fff;border:2px solid var(--ink);border-radius:14px;padding:14px;font-weight:800;font-size:1rem;cursor:pointer;box-shadow:var(--shadow);font-family:var(--font-display);}
  .big-btn:disabled{opacity:.5;}
  label{display:block;font-size:.8rem;font-weight:700;margin:10px 0 4px;} input,textarea,select{width:100%;padding:11px;border:2px solid var(--ink);border-radius:11px;background:#FFFDF8;font:inherit;}
  .ci{display:flex;gap:10px;border:2px solid var(--ink);border-radius:13px;padding:9px;margin-bottom:10px;background:#fff;}
  .ci .th{width:56px;height:56px;border-radius:9px;background:#eee center/cover;flex-shrink:0;}
  .ci .qa{display:flex;align-items:center;gap:8px;margin-top:5px;} .ci .qa button{width:26px;height:26px;border:1.5px solid var(--ink);border-radius:7px;background:#fff;font-weight:800;cursor:pointer;}
  .row{display:flex;gap:10px;} .muted{color:var(--ink-soft);}

  /* product detail carousel */
  .pd-imgs{position:relative;border:2px solid var(--ink);border-radius:14px;overflow:hidden;background:#EFE9DC;aspect-ratio:1/1;}
  .pd-imgs img{width:100%;height:100%;object-fit:cover;display:block;}
  .pd-imgs .a{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.9);border:none;width:38px;height:38px;border-radius:99px;font-size:1.4rem;cursor:pointer;}
  .pd-imgs .a.l{left:8px;} .pd-imgs .a.r{right:8px;}
  .pd-price{font-weight:800;font-size:1.4rem;margin:10px 0 2px;} .pd-price s{color:var(--ink-soft);font-weight:600;font-size:1rem;margin-left:8px;}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;font-weight:700;z-index:300;opacity:0;transition:opacity .2s;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
  <header><div class="head-in">
    <a href="index.html" class="logo" style="text-decoration:none;color:inherit">Aura <span>Cases</span><small>Ready-made cases</small></a>
    <div class="nav">
      <a href="index.html">Customize</a>
      <a href="demos.html">Demos</a>
      <button class="cart-btn" id="cartBtn">Cart<span class="cart-count" id="cartCount">0</span></button>
    </div>
  </div></header>

  <div class="wrap">
    <section class="hero"><h1>Ready-made cases</h1><p>Pick a design that's ready to ship — choose, order, done.</p></section>
    <div class="pills" id="pills"></div>
    <input class="search" id="search" placeholder="Search cases…" />
    <div class="grid" id="grid"><div class="loading">Loading…</div></div>
  </div>

  <!-- product detail -->
  <div class="overlay" id="pdOverlay"></div>
  <div class="sheet" id="pdSheet"><div class="sh-body" id="pdBody"></div></div>

  <!-- cart -->
  <div class="overlay" id="cartOverlay"></div>
  <div class="sheet" id="cartSheet">
    <div class="sh-head"><b id="cartTitle">Your cart</b><button class="x" id="cartClose">✕</button></div>
    <div class="sh-body" id="cartBody"></div>
    <div class="sh-foot" id="cartFoot"></div>
  </div>

  <div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
const $ = id => document.getElementById(id);
const esc = s => String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const taka = n => "৳" + (n==null?0:n);
const sb = (typeof supabase!=="undefined" && CONFIG.SUPABASE_URL && CONFIG.SUPABASE_URL.startsWith("http"))
  ? supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY) : null;

let CATS=[], PRODUCTS=[], activeCat="all", CART=[], SETTINGS={delivery_inside:70,delivery_outside:130,bkash_number:"01XXXXXXXXX"};
try{ CART = JSON.parse(localStorage.getItem("cb_shop_cart")||"[]"); }catch(_){ CART=[]; }
const saveCart = () => { try{ localStorage.setItem("cb_shop_cart", JSON.stringify(CART)); }catch(_){}; $("cartCount").textContent = CART.reduce((s,i)=>s+i.qty,0); };

function showToast(m){ const t=$("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1400); }

async function load(){
  saveCart();
  if(!sb){ $("grid").innerHTML = `<div class="empty">Store not configured.</div>`; return; }
  try{ const { data } = await sb.from("settings").select("*").eq("id",1).single(); if(data) SETTINGS = data; }catch(_){}
  try{ const { data } = await sb.from("product_categories").select("*").eq("active",true).order("sort"); CATS = data||[]; }catch(_){}
  try{ const { data } = await sb.from("readymade_products").select("*").eq("active",true).order("sort"); PRODUCTS = data||[]; }catch(_){ PRODUCTS=[]; }
  renderPills(); renderGrid();
}
function renderPills(){
  const box=$("pills"); const pills=[{id:"all",name:"All"},...CATS];
  box.innerHTML="";
  pills.forEach(c=>{ const b=document.createElement("button"); b.className="pill"+(String(activeCat)===String(c.id)?" active":""); b.textContent=c.name;
    b.onclick=()=>{ activeCat=c.id; renderPills(); renderGrid(); }; box.appendChild(b); });
}
function renderGrid(){
  const q=$("search").value.trim().toLowerCase();
  let list = activeCat==="all"?PRODUCTS:PRODUCTS.filter(p=>String(p.category_id)===String(activeCat));
  if(q) list = list.filter(p=>(p.name||"").toLowerCase().includes(q)||(p.model_fit||"").toLowerCase().includes(q));
  const grid=$("grid");
  if(!list.length){ grid.innerHTML=`<div class="empty">No products${q?" match your search":" yet"}.</div>`; return; }
  grid.innerHTML="";
  list.forEach(p=>{
    const img=(p.image_urls&&p.image_urls[0])||"";
    const disc = p.old_price && p.old_price>p.price ? Math.round((1-p.price/p.old_price)*100) : 0;
    const card=document.createElement("div"); card.className="p-card";
    card.innerHTML=`${disc?`<span class="disc">-${disc}%</span>`:""}
      <div class="ph" style="background-image:url('${esc(img)}')"></div>
      <div class="pb"><div class="nm">${esc(p.name)}</div><div class="fit">${esc(p.model_fit||"")}</div>
        <div class="pr">${taka(p.price)}${p.old_price&&p.old_price>p.price?`<s>${taka(p.old_price)}</s>`:""}</div></div>`;
    card.onclick=()=>openProduct(p);
    grid.appendChild(card);
  });
}
$("search").addEventListener("input", renderGrid);

/* product detail */
let pdImgIdx=0, pdProduct=null;
function openProduct(p){
  pdProduct=p; pdImgIdx=0;
  const imgs=(p.image_urls&&p.image_urls.length)?p.image_urls:[""];
  const disc=p.old_price&&p.old_price>p.price?Math.round((1-p.price/p.old_price)*100):0;
  $("pdBody").innerHTML=`
    <div class="sh-head" style="margin:-16px -16px 14px;padding:14px 16px"><b>${esc(p.name)}</b><button class="x" id="pdClose">✕</button></div>
    <div class="pd-imgs" id="pdImgs"></div>
    <div class="pd-price">${taka(p.price)}${p.old_price&&p.old_price>p.price?`<s>${taka(p.old_price)}</s>`:""}${disc?` <span style="color:var(--accent-dark);font-size:.9rem">(-${disc}%)</span>`:""}</div>
    <div class="muted" style="font-size:.85rem;margin-bottom:8px">${esc(p.model_fit||"")}</div>
    <div style="white-space:pre-wrap;font-size:.9rem;line-height:1.5;margin-bottom:14px">${esc(p.description||"")}</div>
    <button class="big-btn" id="pdAdd">Add to cart · ${taka(p.price)}</button>`;
  renderPdImgs(imgs);
  $("pdClose").onclick=closePd;
  $("pdAdd").onclick=()=>{ addToCart(p); closePd(); openCart(); };
  $("pdOverlay").classList.add("show"); $("pdSheet").classList.add("show");
}
function renderPdImgs(imgs){
  const box=$("pdImgs");
  box.innerHTML=`<img src="${esc(imgs[pdImgIdx]||"")}" alt="${esc(pdProduct.name)}" />
    ${imgs.length>1?`<button class="a l" id="pdPrev">‹</button><button class="a r" id="pdNext">›</button>`:""}`;
  box.querySelector("img").onclick=()=>{ /* could fullscreen */ };
  if(imgs.length>1){ $("pdPrev").onclick=()=>{pdImgIdx=(pdImgIdx-1+imgs.length)%imgs.length;renderPdImgs(imgs);}; $("pdNext").onclick=()=>{pdImgIdx=(pdImgIdx+1)%imgs.length;renderPdImgs(imgs);}; }
}
function closePd(){ $("pdOverlay").classList.remove("show"); $("pdSheet").classList.remove("show"); }
$("pdOverlay").onclick=closePd;

/* cart */
function addToCart(p){
  const ex=CART.find(i=>i.productId===p.id);
  if(ex) ex.qty++; else CART.push({productId:p.id,name:p.name,price:p.price,image:(p.image_urls&&p.image_urls[0])||"",qty:1});
  saveCart(); showToast("Added to cart ✓");
}
function openCart(){ renderCart(); $("cartOverlay").classList.add("show"); $("cartSheet").classList.add("show"); }
function closeCart(){ $("cartOverlay").classList.remove("show"); $("cartSheet").classList.remove("show"); }
$("cartBtn").onclick=openCart; $("cartClose").onclick=closeCart; $("cartOverlay").onclick=closeCart;
const cartSub=()=>CART.reduce((s,i)=>s+i.price*i.qty,0);

function renderCart(){
  const body=$("cartBody"), foot=$("cartFoot");
  $("cartTitle").textContent="Your cart";
  if(!CART.length){ body.innerHTML=`<div class="empty">Cart is empty.</div>`; foot.innerHTML=""; return; }
  body.innerHTML=CART.map((it,i)=>`
    <div class="ci">
      <div class="th" style="background-image:url('${esc(it.image)}')"></div>
      <div style="flex:1"><div style="font-weight:700;font-size:.9rem">${esc(it.name)}</div><div class="muted" style="font-size:.82rem">${taka(it.price)}</div>
        <div class="qa"><button data-d="-1" data-i="${i}">−</button><span>${it.qty}</span><button data-d="1" data-i="${i}">+</button>
          <button data-rm="${i}" style="margin-left:auto;border-color:#b3261e;color:#b3261e">✕</button></div></div>
    </div>`).join("");
  body.querySelectorAll("[data-d]").forEach(b=>b.onclick=()=>{ const it=CART[+b.dataset.i]; it.qty=Math.max(1,it.qty+(+b.dataset.d)); saveCart(); renderCart(); });
  body.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>{ CART.splice(+b.dataset.rm,1); saveCart(); renderCart(); });
  foot.innerHTML=`<div class="row" style="justify-content:space-between;font-weight:800;margin-bottom:10px"><span>Subtotal</span><span>${taka(cartSub())}</span></div>
    <button class="big-btn" id="goCheckout">Checkout</button>`;
  $("goCheckout").onclick=openCheckout;
}

/* checkout */
function openCheckout(){
  const sub=cartSub();
  $("cartTitle").textContent="Checkout";
  $("cartBody").innerHTML=`
    <label>Your name</label><input id="coName" />
    <label>Mobile</label><input id="coMobile" inputmode="tel" />
    <label>Delivery area</label><select id="coArea"><option value="insideDhaka">Inside Dhaka (${taka(SETTINGS.delivery_inside)})</option><option value="outsideDhaka">Outside Dhaka (${taka(SETTINGS.delivery_outside)})</option></select>
    <label>Full address</label><textarea id="coAddr" style="min-height:60px"></textarea>
    <label>Payment</label><select id="coPay"><option>Cash on Delivery</option><option>bKash/Nagad</option></select>
    <div class="err" id="coErr" style="color:#b3261e;font-size:.85rem;margin-top:8px"></div>`;
  const upd=()=>{ const del=$("coArea").value==="insideDhaka"?SETTINGS.delivery_inside:SETTINGS.delivery_outside; $("coTotal").textContent=taka(sub+del); };
  $("cartFoot").innerHTML=`<div class="row" style="justify-content:space-between;font-weight:800;margin-bottom:10px"><span>Total (incl. delivery)</span><span id="coTotal">—</span></div>
    <button class="big-btn" id="placeBtn">Place order</button>`;
  $("coArea").addEventListener("change",upd); upd();
  $("placeBtn").onclick=placeOrder;
}
function makeOrderId(){ return "CB"+Date.now().toString(36).toUpperCase().slice(-6)+Math.floor(Math.random()*36).toString(36).toUpperCase(); }
async function placeOrder(){
  const name=$("coName").value.trim(), mobile=$("coMobile").value.trim(), addr=$("coAddr").value.trim();
  const err=$("coErr");
  if(!name||!mobile||!addr){ err.textContent="Please fill name, mobile and address."; return; }
  if(!CART.length){ err.textContent="Cart is empty."; return; }
  const btn=$("placeBtn"); btn.disabled=true; btn.textContent="Placing…";
  const payload={ order_id:makeOrderId(), name, mobile, area:$("coArea").value, address:addr,
    payment_method:$("coPay").value==="bKash/Nagad"?"bKash/Nagad":"Cash on Delivery", promo_code:null,
    items: CART.map(it=>({ productId:it.productId, qty:it.qty, name:it.name, image:it.image, readymade:true })), photo_urls:[] };
  try{
    const { data:res, error } = await sb.rpc("place_order",{ payload });
    if(error) throw error;
    if(res && res.ok===false) throw new Error(res.error||"Server error");
    CART=[]; saveCart();
    $("cartTitle").textContent="Order placed ✓";
    $("cartBody").innerHTML=`<div style="text-align:center;padding:30px 10px">
      <div style="font-size:2.4rem">🎉</div><h2 style="font-family:var(--font-display);margin:8px 0">Thank you!</h2>
      <p>Order <b>${esc(res.order_id)}</b> placed. We'll call <b>${esc(mobile)}</b> to confirm.</p>
      ${$("coPay").value==="bKash/Nagad"?`<p style="margin-top:10px">Send <b>${taka(res.total)}</b> to <b>${esc(SETTINGS.bkash_number)}</b> (bKash/Nagad), reference <b>${esc(res.order_id)}</b>.</p>`:""}
      <p class="muted" style="margin-top:10px">Total: <b>${taka(res.total)}</b></p></div>`;
    $("cartFoot").innerHTML=`<button class="big-btn" id="doneBtn">Done</button>`;
    $("doneBtn").onclick=()=>{ closeCart(); };
  }catch(e){ err.textContent="Couldn't place order — "+(e.message||"try again"); btn.disabled=false; btn.textContent="Place order"; }
}

load();
</script>
</body>
</html>
